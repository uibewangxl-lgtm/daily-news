name: 每日新闻推送

on:
  schedule:
    - cron: "30 23 * * *"
    - cron: "35 11 * * *"
  workflow_dispatch:

jobs:
  news-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📬 抓取并推送新闻
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python news_digest.py

      - name: ✅ 完成
        run: echo "每日新闻推送完成"
